name: JII30 Daily Screener Fetcher

on:
  schedule:
    # Berjalan jam 19:10 WIB (12:10 UTC) Setiap Senin - Jumat
    - cron: '10 12 * * 1-5'
  workflow_dispatch:

# Menyembunyikan peringatan Node.js
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install yfinance requests supabase pandas scikit-learn 
          pip install https://www.pandas-ta.dev/assets/zip/pandas_ta-0.4.25b0.tar.gz

      - name: Run Fetcher Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          IDX_API_KEY: ${{ secrets.IDX_API_KEY }}
        run: python fetcher.py