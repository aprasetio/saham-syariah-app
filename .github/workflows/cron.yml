name: JII30 Daily Screener Fetcher

on:
  schedule:
    # Berjalan jam 19:00 WIB (12:00 UTC) Setiap Senin - Jumat
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

# Menyembunyikan peringatan Node.js
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        # Bypass PyPI: Mengambil pandas-ta langsung dari Source Code aslinya
        run: |
          pip install "numpy<2.0.0" "pandas<3.0.0" yfinance requests supabase
          pip install git+https://github.com/twopirllc/pandas-ta.git@main

      - name: Run Fetcher Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          IDX_API_KEY: ${{ secrets.IDX_API_KEY }}
        run: python fetcher.py